<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR MAWARAN — ڕاگەیاندنەکان</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <link rel="apple-touch-icon" href="assets/icon.png">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; }
    .sidebar { right:0;left:auto;transform:translateX(100%); }
    .sidebar.open { transform:translateX(0); }
    .main-content { margin-right:260px;margin-left:0; }
    .topbar { flex-direction:row-reverse; }
    .topbar-title { margin-right:12px;margin-left:0; }
    .nav-item { flex-direction:row-reverse;text-align:right; }
    .nav-icon { margin-right:0;margin-left:10px; }
    .sidebar-header { flex-direction:row-reverse; }
    .sidebar-user { text-align:right; }
    .page-header { text-align:right; }
    @media(max-width:768px){
      .sidebar{right:0;left:auto;transform:translateX(110%);}
      .sidebar.open{transform:translateX(0);}
      .main-content{margin-right:0;}
    }
    .company-logo-img{height:36px;width:auto;object-fit:contain;}
  </style>
</head>
<body>
<div id="sidebarOverlay" class="sidebar-overlay"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <img src="assets/logo.png" alt="HR MAWARAN" class="company-logo-img"
         onerror="this.style.display='none';document.getElementById('sbLogoFallback').style.display='flex'">
    <div id="sbLogoFallback" style="display:none;align-items:center;gap:8px">
      <div class="sidebar-logo-icon">🏢</div>
      <div class="sidebar-logo-text"><div class="brand-name">HR MAWARAN</div><div class="brand-sub">پۆرتاڵی کارمەند</div></div>
    </div>
  </div>
  <div class="sidebar-user">
    <div class="sidebar-user-name" id="sidebarUserName">چاوەڕێبکە...</div>
    <div class="sidebar-user-role" id="sidebarUserRole">کارمەند</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">مینیوی سەرەکی</div>
    <a class="nav-item" href="profile.html"><span class="nav-icon">👤</span> پرۆفایلەکەم</a>
    <a class="nav-item" href="attendance.html"><span class="nav-icon">🕐</span> ئامادەبوون</a>
    <a class="nav-item active" href="announcements.html"><span class="nav-icon">📢</span> ڕاگەیاندنەکان</a>
    <a class="nav-item" href="salary.html"><span class="nav-icon">💰</span> مووچەکەم</a>
    <a class="nav-item" href="leaves.html"><span class="nav-icon">🌴</span> مۆڵەتەکانم</a>
  </nav>
  <div class="sidebar-footer">
    <button class="btn btn-ghost btn-block" data-logout>🚪 چوونەدەرەوە</button>
  </div>
</aside>

<!-- Main Content -->
<div class="main-content">
  <header class="topbar">
    <div class="topbar-avatar" id="topbarAvatar">?</div>
    <span class="topbar-date" id="topbarDate"></span>
    <div class="topbar-spacer"></div>
    <span class="topbar-title">ڕاگەیاندنەکان</span>
    <button class="topbar-hamburger" id="hamburger">☰</button>
  </header>

  <main class="page-content">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <h1 class="page-title">Company Announcements</h1>
        <p class="page-subtitle">Stay up to date with the latest company news</p>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="loadAnnouncements()">🔄 Refresh</button>
    </div>

    <!-- Search bar -->
    <div style="margin-bottom:20px">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="form-control search-input" id="annSearchInput" placeholder="Search announcements...">
      </div>
    </div>

    <!-- Announcement list -->
    <div id="annList">
      <div class="loading-rows">
        <div class="spinner" style="margin:0 auto 12px"></div>
        Loading announcements...
      </div>
    </div>
  </main>
</div>

<script src="assets/script.js"></script>
<script>
let allAnnouncements = [];

document.addEventListener('DOMContentLoaded', async () => {
  requireAuth(false);
  await loadAnnouncements();

  document.getElementById('annSearchInput').addEventListener('input', debounce(filterAnn, 300));
});

async function loadAnnouncements() {
  const listEl = document.getElementById('annList');
  listEl.innerHTML = `<div class="loading-rows"><div class="spinner" style="margin:0 auto 12px"></div>Loading announcements...</div>`;

  try {
    const res = await API.getAnnouncements();
    if (!res.success) throw new Error(res.message);

    allAnnouncements = res.data || [];
    renderAnnouncements(allAnnouncements);

  } catch (e) {
    listEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Failed to load announcements</div>
        <div class="empty-desc">${e.message}</div>
      </div>`;
    Toast.error('Load Failed', e.message);
  }
}

function renderAnnouncements(data) {
  const listEl = document.getElementById('annList');

  if (!data.length) {
    listEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📢</div>
        <div class="empty-title">No announcements yet</div>
        <div class="empty-desc">Check back later for company updates</div>
      </div>`;
    return;
  }

  // Sort newest first
  const sorted = [...data].sort((a, b) => new Date(b.date) - new Date(a.date));

  listEl.innerHTML = sorted.map(ann => `
    <div class="announcement-card">
      <div class="announcement-title">${escapeHtml(ann.title)}</div>
      <div class="announcement-body">${escapeHtml(ann.message)}</div>
      <div class="announcement-meta">
        <span>📅</span>
        <span>${formatDate(ann.date)}</span>
        <span style="margin-left:8px;color:var(--text-muted)">• HR Department</span>
      </div>
    </div>
  `).join('');
}

function filterAnn() {
  const q = document.getElementById('annSearchInput').value.toLowerCase();
  const filtered = allAnnouncements.filter(a =>
    a.title?.toLowerCase().includes(q) || a.message?.toLowerCase().includes(q)
  );
  renderAnnouncements(filtered);
}
</script>
</body>
</html>
